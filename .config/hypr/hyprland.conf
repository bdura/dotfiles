source = ~/.config/hypr/themes/catppuccin-mocha.conf

exec-once = dbus-update-activation-environment --systemd --all && systemctl --user stop hyprland-session.target && systemctl --user start hyprland-session.target
env = NIXOS_OZONE_WL, 1
env = NIXPKGS_ALLOW_UNFREE, 1
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = GDK_BACKEND, wayland, x11
env = CLUTTER_BACKEND, wayland
env = QT_QPA_PLATFORM=wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = MOZ_ENABLE_WAYLAND, 1
exec-once = hyprpaper
exec-once = hypridle
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = swaync
exec-once = nm-applet --indicator
exec-once = lxqt-policykit-agent


$dotblocksLGScreen = LG Electronics LG HDR 4K 0x00025CD8
$homeScreen = Samsung Electric Company LS27D80xU HNAX400122

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1,preferred,auto,1
monitor = desc:$dotblocksLGScreen,preferred,auto-up,1
monitor = desc:$homeScreen,preferred,auto-left,1
monitor = ,preferred,auto,1
# monitor = , preferred, auto, 1, mirror, eDP-1


general {
  gaps_in = 6
  gaps_out = 8
  border_size = 2
  layout = dwindle
  resize_on_border = true
  col.active_border = rgb(f38ba8) rgb(B4F9F8) 45deg
  col.inactive_border = rgb(16161E)
}
input {
  kb_layout = us
  kb_variant = mac
  # kb_options = grp:alt_shift_toggle
  # kb_options = caps:super
  follow_mouse = 1
  touchpad {
    natural_scroll = true
    disable_while_typing = true
    scroll_factor = 0.8
  }
  sensitivity = 0.5 # -1.0 - 1.0, 0 means no modification.
  accel_profile = flat
}
windowrule = border_size 0, match:class ^(wofi)$
windowrule = center on, match:class ^(wofi)$
windowrule = center on, match:class ^(steam)$
windowrule = float on, match:class nm-connection-editor|blueman-manager
windowrule = float on, match:class swayimg|vlc|Viewnior|pavucontrol
windowrule = float on, match:class ^Bitwarden$
windowrule = float on, match:class nwg-look|qt5ct|mpv
gesture = 3, horizontal, workspace
misc {
  initial_workspace_tracking = 0
  mouse_move_enables_dpms = true
  key_press_enables_dpms = false
}
animations {
  enabled = yes
  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.1, 0.1, 1.1
  bezier = winOut, 0.3, -0.3, 0, 1
  bezier = liner, 1, 1, 1, 1
  animation = windows, 1, 6, wind, slide
  animation = windowsIn, 1, 6, winIn, slide
  animation = windowsOut, 1, 5, winOut, slide
  animation = windowsMove, 1, 5, wind, slide
  animation = border, 1, 1, liner
  animation = fade, 1, 10, default
  animation = workspaces, 1, 5, wind
}
decoration {
  rounding = 10
  blur {
      enabled = true
      size = 5
      passes = 3
      new_optimizations = on
      ignore_opacity = off
  }
}
dwindle {
  # pseudotile = true
  preserve_split = true
}
bind = SUPER,Return,exec,kitty
bind = SUPERSHIFT,Return,exec,firefox
bind = SUPER,SPACE,exec,rofi-launcher
bind = SUPERSHIFT,N,exec,swaync-client -rs
bind = SUPER,W,killactive,
bind = SUPER,S,exec,screenshootin
bind = SUPER,C,exec,hyprpicker -a
bind = SUPER,T,exec,thunar
bind = SUPER,M,exec,spotify
bind = SUPER,F,fullscreen,
bind = SUPERSHIFT,F,togglefloating,
bind = SUPERSHIFT,left,movewindow,l
bind = SUPERSHIFT,right,movewindow,r
bind = SUPERSHIFT,up,movewindow,u
bind = SUPERSHIFT,down,movewindow,d
bind = SUPERSHIFT,h,movewindow,l
bind = SUPERSHIFT,l,movewindow,r
bind = SUPERSHIFT,k,movewindow,u
bind = SUPERSHIFT,j,movewindow,d
bind = SUPERALT,h,resizeactive,-30 0
bind = SUPERALT,l,resizeactive,30 0
bind = SUPERALT,k,resizeactive,0 -30
bind = SUPERALT,j,resizeactive,0 30
bind = SUPER,left,movefocus,l
bind = SUPER,right,movefocus,r
bind = SUPER,up,movefocus,u
bind = SUPER,down,movefocus,d
bind = SUPER,h,movefocus,l
bind = SUPER,l,movefocus,r
bind = SUPER,k,movefocus,u
bind = SUPER,j,movefocus,d
bind = SUPER,1,workspace,1
bind = SUPER,2,workspace,2
bind = SUPER,3,workspace,3
bind = SUPER,4,workspace,4
bind = SUPER,5,workspace,5
bind = SUPER,6,workspace,6
bind = SUPER,7,workspace,7
bind = SUPER,8,workspace,8
bind = SUPER,9,workspace,9
bind = SUPER,0,workspace,10
bind = SUPERSHIFT,1,movetoworkspace,1
bind = SUPERSHIFT,2,movetoworkspace,2
bind = SUPERSHIFT,3,movetoworkspace,3
bind = SUPERSHIFT,4,movetoworkspace,4
bind = SUPERSHIFT,5,movetoworkspace,5
bind = SUPERSHIFT,6,movetoworkspace,6
bind = SUPERSHIFT,7,movetoworkspace,7
bind = SUPERSHIFT,8,movetoworkspace,8
bind = SUPERSHIFT,9,movetoworkspace,9
bind = SUPERSHIFT,0,movetoworkspace,10
bind = SUPERCONTROL,right,workspace,e+1
bind = SUPERCONTROL,left,workspace,e-1
binde = ,XF86AudioRaiseVolume,exec,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = ,XF86AudioLowerVolume,exec,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = ,XF86AudioPlay, exec, playerctl play-pause
bind = ,XF86AudioPause, exec, playerctl play-pause
bind = ,XF86AudioNext, exec, playerctl next
bind = ,XF86AudioPrev, exec, playerctl previous
bind = ,XF86MonBrightnessDown,exec,brightnessctl set 5%-
bind = ,XF86MonBrightnessUp,exec,brightnessctl set +5%
bind = SUPER, ESCAPE, exec, sleep 0.1 && hyprlock
